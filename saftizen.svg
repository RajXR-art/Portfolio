<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060309" />
      <stop offset="100%" stop-color="#140f1a" />
    </linearGradient>
    <linearGradient id="safety-orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316" />
      <stop offset="100%" stop-color="#ea580c" />
    </linearGradient>
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg-grad)" />

  <!-- Scaffolding Lines (Work at Height theme) -->
  <line x1="60" y1="200" x2="60" y2="40" stroke="rgba(255, 255, 255, 0.04)" stroke-width="2" />
  <line x1="340" y1="200" x2="340" y2="40" stroke="rgba(255, 255, 255, 0.04)" stroke-width="2" />
  <line x1="60" y1="90" x2="340" y2="90" stroke="rgba(255, 255, 255, 0.03)" stroke-width="2" />
  <line x1="60" y1="150" x2="340" y2="150" stroke="rgba(255, 255, 255, 0.03)" stroke-width="2" />
  <line x1="60" y1="90" x2="160" y2="150" stroke="rgba(255, 255, 255, 0.02)" stroke-width="1.5" />
  <line x1="340" y1="90" x2="240" y2="150" stroke="rgba(255, 255, 255, 0.02)" stroke-width="1.5" />

  <!-- Glowing Hazard Warning Triangle -->
  <polygon points="200,45 255,145 145,145" fill="none" stroke="url(#safety-orange)" stroke-width="3" filter="url(#glow)" />
  <polygon points="200,53 245,138 155,138" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1" />

  <!-- Safety Hardhat Helmet inside Triangle -->
  <g transform="translate(200, 102) scale(0.65)" filter="url(#glow)">
    <!-- Helmet dome -->
    <path d="M -30,0 C -30,-30 30,-30 30,0 L 32,5 C 32,10 -32,10 -32,5 Z" fill="#facc15" stroke="#fff" stroke-width="1" />
    <!-- Helmet brim -->
    <ellipse cx="0" cy="8" rx="42" ry="5" fill="#facc15" stroke="#fff" stroke-width="1" />
    <!-- Crest/Ridge -->
    <path d="M -6,-18 Q 0,-24 6,-18 L 4,5 L -4,5 Z" fill="#eab308" />
  </g>

  <!-- Confined space ring/boundary -->
  <circle cx="200" cy="100" r="62" fill="none" stroke="rgba(234, 88, 12, 0.2)" stroke-width="1" stroke-dasharray="6 8" />

  <!-- Labels -->
  <text x="20" y="30" fill="rgba(255,255,255,0.4)" font-family="sans-serif" font-size="9" letter-spacing="1">INDUSTRIAL SAFETY SYSTEM</text>
  <text x="315" y="30" fill="#f97316" font-family="sans-serif" font-size="9" font-weight="bold">HAZARD VR</text>
</svg>
