<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#040712" />
      <stop offset="100%" stop-color="#0e122b" />
    </linearGradient>
    <linearGradient id="yellow-glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#eab308" />
      <stop offset="100%" stop-color="#ca8a04" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg-grad)" />

  <!-- Road curves with dotted lines -->
  <path d="M -50,150 Q 150,50 450,150" fill="none" stroke="rgba(255, 255, 255, 0.08)" stroke-width="32" />
  <path d="M -50,150 Q 150,50 450,150" fill="none" stroke="#eab308" stroke-width="2" stroke-dasharray="10 12" filter="url(#glow)" />

  <!-- US Interstate Highway Shield Sign -->
  <g transform="translate(200, 80) scale(0.9)" filter="url(#glow)">
    <!-- Shield Path -->
    <path d="M-25,-30 C-25,-30 -10,-33 0,-33 C10,-33 25,-30 25,-30 C25,-30 27,5 25,15 C23,25 0,40 0,40 C0,40 -23,25 -25,15 C-27,5 -25,-30 -25,-30 Z" fill="#1e3a8a" stroke="#fff" stroke-width="3" />
    <!-- Red top header of US shield -->
    <path d="M-23.5,-29 C-23.5,-29 -10,-31.5 0,-31.5 C10,-31.5 23.5,-29 23.5,-29 L 23.5,-12 L -23.5,-12 Z" fill="#ef4444" />
    <text x="0" y="20" fill="#fff" font-family="sans-serif" font-weight="bold" font-size="24" text-anchor="middle">VR</text>
  </g>

  <!-- Navigation Target Node -->
  <circle cx="310" cy="115" r="10" fill="none" stroke="#22c55e" stroke-width="2" filter="url(#glow)" />
  <circle cx="310" cy="115" r="3" fill="#22c55e" />
  <line x1="310" y1="100" x2="310" y2="130" stroke="#22c55e" stroke-width="1" />
  <line x1="295" y1="115" x2="325" y2="115" stroke="#22c55e" stroke-width="1" />

  <!-- Labels -->
  <text x="20" y="30" fill="rgba(255,255,255,0.4)" font-family="sans-serif" font-size="9" letter-spacing="1">US DRIVING RULE SIMULATOR</text>
  <text x="320" y="30" fill="#eab308" font-family="sans-serif" font-size="9" font-weight="bold">GUIDED FLOWS</text>
</svg>
