<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#05060b" />
      <stop offset="100%" stop-color="#0c0e1b" />
    </linearGradient>
    <linearGradient id="neon-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg-grad)" />

  <!-- Road grid effect in VR perspective -->
  <path d="M 200,80 L 0,200 M 200,80 L 100,200 M 200,80 L 300,200 M 200,80 L 400,200" stroke="rgba(0, 242, 254, 0.15)" stroke-width="1.5" />
  <path d="M 0,140 L 400,140 M 0,170 L 400,170" stroke="rgba(0, 242, 254, 0.1)" stroke-width="1" />

  <!-- VR Headset Silhouette Overlay -->
  <rect x="130" y="40" width="140" height="60" rx="20" fill="rgba(255, 255, 255, 0.03)" stroke="rgba(255, 255, 255, 0.12)" stroke-width="1" />
  <circle cx="170" cy="70" r="15" fill="none" stroke="rgba(0, 242, 254, 0.2)" stroke-width="1" />
  <circle cx="230" cy="70" r="15" fill="none" stroke="rgba(0, 242, 254, 0.2)" stroke-width="1" />

  <!-- Driving Wheel Silhouette -->
  <circle cx="200" cy="130" r="45" fill="none" stroke="url(#neon-blue)" stroke-width="4" filter="url(#glow)" />
  <circle cx="200" cy="130" r="38" fill="none" stroke="rgba(255, 255, 255, 0.2)" stroke-width="1" />
  
  <!-- Steering Wheel Spokes -->
  <path d="M 200,130 L 200,175 M 200,130 L 160,115 M 200,130 L 240,115" stroke="url(#neon-blue)" stroke-width="3.5" filter="url(#glow)" />
  
  <!-- Speedometer dashboard layout in bottom corner -->
  <path d="M 30,170 A 30,30 0 0,1 90,170" fill="none" stroke="rgba(255, 255, 255, 0.2)" stroke-width="3" stroke-dasharray="2 2" />
  <path d="M 30,170 A 30,30 0 0,1 75,145" fill="none" stroke="#00f2fe" stroke-width="3" filter="url(#glow)" />
  
  <!-- Tech label -->
  <text x="20" y="30" fill="rgba(255,255,255,0.4)" font-family="sans-serif" font-size="9" letter-spacing="1">PC VR &amp; HARDWARE INTEGRATION</text>
  <text x="330" y="30" fill="#00f2fe" font-family="sans-serif" font-size="9" font-weight="bold">UNITY VR</text>
</svg>
